# Simple GitLab CI/CD Pipeline
# Fast and reliable - no Ollama needed

stages:
  - validate
  - test

# Build test
validate:build:
  stage: validate
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - echo "Building Docker image..."
    - docker build -t cpputest-generator:test .
    - echo "Build successful"
  only:
    - merge_requests
    - main

# Python import test
validate:import:
  stage: validate
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y gcc g++
    - pip install -q -r requirements.txt
  script:
    - echo "Testing imports..."
    - python -c "from fastapi import FastAPI; print('FastAPI OK')"
    - python -c "import faiss; print('FAISS OK')"
    - python -c "import aiohttp; print('aiohttp OK')"
    - python -c "import numpy; print('NumPy OK')"
    - echo "All imports successful"
  only:
    - merge_requests
    - main

# Service health test
test:health:
  stage: test
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - apk add --no-cache curl jq
  script:
    - docker build -t cpputest-test .
    - docker run -d --name test-service -p 8000:8000 cpputest-test
    - sleep 30
    - curl -f http://localhost:8000/health
    - echo "Service is healthy"
  after_script:
    - docker logs test-service || true
    - docker stop test-service || true
  only:
    - merge_requests
    - main

# API test
test:api:
  stage: test
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - apk add --no-cache curl jq
    - mkdir -p c_projects/test
    - echo 'int add(int a, int b) { return a + b; }' > c_projects/test/math.c
  script:
    - docker build -t cpputest-test .
    - docker run -d --name api-test -p 8000:8000 -v $(pwd)/c_projects:/app/c_projects cpputest-test
    - sleep 30
    - curl -f http://localhost:8000/health
    - RESULT=$(curl -s "http://localhost:8000/analyze-project?project_path=/app/c_projects/test")
    - echo "$RESULT"
    - FUNCS=$(echo "$RESULT" | jq -r '.total_functions // 0')
    - echo "Found $FUNCS functions"
    - test "$FUNCS" -gt 0
    - echo "API test passed"
  after_script:
    - docker logs api-test || true
    - docker stop api-test || true
  only:
    - merge_requests
    - main