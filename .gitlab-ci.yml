# Quick GitLab CI/CD Pipeline for CppUTest Generator
# Optimized for speed - runs in ~5 minutes

stages:
  - validate
  - quick-test

# Quick validation - checks if code can build (~2 min)
validate:build:
  stage: validate
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - echo "Quick build test..."
    - docker build -t cpputest-generator:test .
    - echo "✓ Build successful"
  only:
    - merge_requests
    - main

# Python import test - very fast (~30 sec)
validate:import:
  stage: validate
  image: python:3.11-slim
  before_script:
    - pip install -q -r requirements.txt
  script:
    - echo "Testing Python imports..."
    - python -c "from fastapi import FastAPI; print('✓ FastAPI OK')"
    - python -c "import faiss; print('✓ FAISS OK')"
    - python -c "import aiohttp; print('✓ aiohttp OK')"
    - python -c "import numpy; print('✓ NumPy OK')"
    - echo "✓ All imports successful"
  only:
    - merge_requests
    - main

# Docker compose validation (~30 sec)
validate:compose:
  stage: validate
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - echo "Validating docker-compose.yml..."
    - docker compose config > /dev/null
    - echo "✓ Docker compose valid"
  only:
    - merge_requests
    - main

# Quick functional test (~3 min)
test:smoke:
  stage: quick-test
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
    - name: your-ollama-image:latest
      alias: ollama
  variables:
    DOCKER_DRIVER: overlay2
  before_script:
    - apk add --no-cache curl jq bash
    - mkdir -p c_projects/test test_examples generated_tests logs
    # Create minimal test file
    - echo 'int add(int a, int b) { return a + b; }' > c_projects/test/test.c
  script:
    - docker compose up -d
    - echo "Waiting for Ollama..."
    - |
      for i in {1..30}; do
        if curl -sf http://ollama:11434/api/health > /dev/null 2>&1; then
          echo "✓ Ollama ready after ${i}0 seconds"
          break
        fi
        sleep 10
      done
    - echo "Waiting for CppUTest Generator..."
    - |
      for i in {1..20}; do
        if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
          echo "✓ Service ready after ${i}0 seconds"
          break
        fi
        sleep 10
      done
    - RESULT=$(curl -sf "http://localhost:8000/analyze-project?project_path=/app/c_projects/test")
    - FUNCS=$(echo "$RESULT" | jq -r '.total_functions')
    - echo "Found $FUNCS function(s)"
    - test "$FUNCS" -gt 0
  after_script:
    - docker compose logs --tail=50 cpputest-generator || true
    - docker compose down -v