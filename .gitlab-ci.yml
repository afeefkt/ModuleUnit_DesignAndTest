# Fast GitLab CI/CD - Comprehensive Basic Checks
# Tests everything except AI generation (~5 minutes total)

stages:
  - validate
  - build
  - test
  - verify

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

# ============================================
# STAGE 1: VALIDATE (Check code quality)
# ============================================

# Python syntax and style check (30 sec)
validate:syntax:
  stage: validate
  image: python:3.11-slim
  before_script:
    - pip install -q flake8 black pylint
  script:
    - echo "🔍 Checking Python syntax..."
    - python -m py_compile *.py || echo "No Python files in root"
    - find . -name "*.py" -type f -exec python -m py_compile {} \;
    - echo "✓ Syntax valid"
    - echo "🎨 Checking code style..."
    - flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    - echo "✓ No critical style issues"
  allow_failure: false
  only:
    - merge_requests
    - main
  tags:
    - docker

# Check all required files exist (10 sec)
validate:files:
  stage: validate
  image: alpine:latest
  script:
    - echo "📁 Checking required files..."
    - test -f Dockerfile && echo "✓ Dockerfile exists" || exit 1
    - test -f docker-compose.yml && echo "✓ docker-compose.yml exists" || exit 1
    - test -f requirements.txt && echo "✓ requirements.txt exists" || exit 1
    - test -f README.md && echo "✓ README.md exists" || echo "⚠ No README.md"
    - echo "✓ All critical files present"
  only:
    - merge_requests
    - main
  tags:
    - docker

# Validate Docker configurations (20 sec)
validate:docker-config:
  stage: validate
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - echo "🐳 Validating Dockerfile..."
    - docker build --no-cache --target builder -t test-build . 2>&1 | head -20 || echo "No multi-stage build"
    - echo "✓ Dockerfile syntax valid"
    - echo "🐳 Validating docker-compose..."
    - apk add --no-cache docker-compose
    - docker-compose config > /dev/null
    - echo "✓ docker-compose.yml valid"
  only:
    - merge_requests
    - main
  tags:
    - docker

# Check Python dependencies (1 min)
validate:dependencies:
  stage: validate
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends gcc g++ git
  script:
    - echo "📦 Installing dependencies..."
    - pip install --dry-run -r requirements.txt
    - echo "✓ All dependencies installable"
    - echo "🔍 Checking for security vulnerabilities..."
    - pip install safety
    - safety check -r requirements.txt || echo "⚠ Some vulnerabilities found (non-blocking)"
  allow_failure: true
  only:
    - merge_requests
    - main
  tags:
    - docker

# ============================================
# STAGE 2: BUILD (Build Docker image)
# ============================================

build:image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - echo "🔨 Building Docker image..."
    - docker build -t cpputest-generator:$CI_COMMIT_SHORT_SHA .
    - echo "✓ Build successful"
    - echo "📊 Image size:"
    - docker images cpputest-generator:$CI_COMMIT_SHORT_SHA --format "{{.Size}}"
    - echo "🔍 Checking image layers..."
    - docker history cpputest-generator:$CI_COMMIT_SHORT_SHA | head -10
  only:
    - merge_requests
    - main
  tags:
    - docker

# ============================================
# STAGE 3: TEST (Test functionality)
# ============================================

# Test Python imports (30 sec)
test:imports:
  stage: test
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends gcc g++
    - pip install -q -r requirements.txt
  script:
    - echo "🧪 Testing critical imports..."
    - python -c "from fastapi import FastAPI; print('✓ FastAPI')"
    - python -c "import faiss; print('✓ FAISS')"
    - python -c "import aiohttp; print('✓ aiohttp')"
    - python -c "import numpy as np; print('✓ NumPy')"
    - python -c "from sentence_transformers import SentenceTransformer; print('✓ Sentence Transformers')"
    - echo "✓ All imports successful"
  only:
    - merge_requests
    - main
  tags:
    - docker

# Test service starts and responds (1 min)
test:service-health:
  stage: test
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - apk add --no-cache curl jq bash
  script:
    - echo "🚀 Starting service..."
    - docker build -t cpputest-test .
    - docker run -d --name test-service -p 8000:8000 -e OLLAMA_HOST=http://mock:11434 cpputest-test
    - echo "⏳ Waiting for service to start..."
    - sleep 30
    - echo "🔍 Testing health endpoint..."
    - curl -f http://localhost:8000/health || (docker logs test-service && exit 1)
    - HEALTH=$(curl -s http://localhost:8000/health)
    - echo "Health response - $HEALTH"
    - echo "✓ Service is healthy"
  after_script:
    - docker logs test-service 2>&1 | tail -50 || true
    - docker stop test-service || true
    - docker rm test-service || true
  only:
    - merge_requests
    - main
  tags:
    - docker

# Test API endpoints (2 min)
test:api-endpoints:
  stage: test
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - apk add --no-cache curl jq bash
    - mkdir -p c_projects/test generated_tests logs
    - echo '#include "calculator.h"' > c_projects/test/calculator.c
    - echo 'int add(int a, int b) { return a + b; }' >> c_projects/test/calculator.c
    - echo 'int subtract(int a, int b) { return a - b; }' >> c_projects/test/calculator.c
    - echo 'int multiply(int a, int b) { return a * b; }' >> c_projects/test/calculator.c
    - echo '#ifndef CALCULATOR_H' > c_projects/test/calculator.h
    - echo '#define CALCULATOR_H' >> c_projects/test/calculator.h
    - echo 'int add(int a, int b);' >> c_projects/test/calculator.h
    - echo 'int subtract(int a, int b);' >> c_projects/test/calculator.h
    - echo 'int multiply(int a, int b);' >> c_projects/test/calculator.h
    - echo '#endif' >> c_projects/test/calculator.h
  script:
    - echo "🚀 Starting service with test files..."
    - docker build -t cpputest-test .
    - docker run -d --name api-test -p 8000:8000 -v $(pwd)/c_projects:/app/c_projects -v $(pwd)/generated_tests:/app/generated_tests -e OLLAMA_HOST=http://mock:11434 cpputest-test
    - sleep 30
    - echo "🔍 Testing /health endpoint..."
    - curl -f http://localhost:8000/health
    - echo "✓ Health endpoint OK"
    - echo "🔍 Testing /analyze-project endpoint..."
    - RESULT=$(curl -sf "http://localhost:8000/analyze-project?project_path=/app/c_projects/test")
    - echo "Analysis result - $RESULT"
    - FUNCS=$(echo "$RESULT" | jq -r '.total_functions // 0')
    - FILES=$(echo "$RESULT" | jq -r '.total_files // 0')
    - echo "Found $FUNCS function(s) in $FILES file(s)"
    - test "$FUNCS" -eq 3 || (echo "Expected 3 functions, got $FUNCS" && exit 1)
    - test "$FILES" -eq 1 || (echo "Expected 1 file, got $FILES" && exit 1)
    - echo "✓ Project analysis working correctly"
  after_script:
    - echo "=== Service Logs ==="
    - docker logs api-test 2>&1 | tail -100 || true
    - docker stop api-test || true
    - docker rm api-test || true
  only:
    - merge_requests
    - main
  tags:
    - docker

# Test with multiple C files (1 min)
test:multiple-files:
  stage: test
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - apk add --no-cache curl jq bash
    - mkdir -p c_projects/multitest
    - echo 'int add(int a, int b) { return a + b; }' > c_projects/multitest/math.c
    - echo 'int subtract(int a, int b) { return a - b; }' >> c_projects/multitest/math.c
    - echo 'int string_length(char* str) { int len = 0; while(str[len]) len++; return len; }' > c_projects/multitest/string.c
    - echo 'int is_even(int n) { return n % 2 == 0; }' > c_projects/multitest/logic.c
    - echo 'int is_positive(int n) { return n > 0; }' >> c_projects/multitest/logic.c
  script:
    - docker build -t cpputest-test .
    - docker run -d --name multi-test -p 8000:8000 -v $(pwd)/c_projects:/app/c_projects cpputest-test
    - sleep 30
    - echo "🔍 Testing with multiple files..."
    - RESULT=$(curl -sf "http://localhost:8000/analyze-project?project_path=/app/c_projects/multitest")
    - echo "$RESULT"
    - FUNCS=$(echo "$RESULT" | jq -r '.total_functions')
    - FILES=$(echo "$RESULT" | jq -r '.total_files')
    - echo "Found $FUNCS functions in $FILES files"
    - test "$FUNCS" -eq 5
    - test "$FILES" -eq 3
    - echo "✓ Multiple file analysis working"
  after_script:
    - docker logs multi-test 2>&1 | tail -50 || true
    - docker stop multi-test || true
  only:
    - merge_requests
    - main
  tags:
    - docker

# ============================================
# STAGE 4: VERIFY (Final checks)
# ============================================

# Verify Docker Compose works (1 min)
verify:docker-compose:
  stage: verify
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - apk add --no-cache docker-compose curl
  script:
    - echo "🐳 Testing docker-compose..."
    - docker-compose config
    - echo "✓ docker-compose.yml valid"
    - echo "🚀 Starting services..."
    - docker-compose up -d cpputest-generator
    - sleep 30
    - echo "🔍 Checking service..."
    - curl -f http://localhost:8000/health
    - echo "✓ Docker Compose deployment works"
  after_script:
    - docker-compose logs --tail=50 || true
    - docker-compose down -v || true
  only:
    - merge_requests
    - main
  tags:
    - docker

# Security scan (optional, informational)
verify:security:
  stage: verify
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker build -t cpputest-scan .
  script:
    - echo "🔒 Running security checks..."
    - echo "Checking for exposed secrets..."
    - docker run --rm -v $(pwd):/scan cpputest-scan sh -c "grep -r 'password\|secret\|key' --exclude-dir=.git --exclude='*.md' ." || echo "No exposed secrets"
    - echo "Checking Docker image..."
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image cpputest-scan || echo "Trivy not available"
    - echo "✓ Security scan complete"
  allow_failure: true
  only:
    - main
  tags:
    - docker

# Generate test report
verify:report:
  stage: verify
  image: alpine:latest
  script:
    - echo "📊 Test Summary Report"
    - echo "======================"
    - echo "Branch: $CI_COMMIT_BRANCH"
    - echo "Commit: $CI_COMMIT_SHORT_SHA"
    - echo "Author: $CI_COMMIT_AUTHOR"
    - echo "Message: $CI_COMMIT_MESSAGE"
    - echo ""
    - echo "Tests Completed:"
    - echo "✓ Syntax validation"
    - echo "✓ File structure check"
    - echo "✓ Docker build"
    - echo "✓ Python imports"
    - echo "✓ Service health check"
    - echo "✓ API endpoint tests"
    - echo "✓ Multiple file handling"
    - echo "✓ Docker Compose verification"
    - echo ""
    - echo "All basic checks passed! ✅"
  only:
    - merge_requests
    - main
  tags:
    - docker