                {"id":"N_02","name":"l_f32Boost = EPS_GetBoostFactor(l_f32Speed)","node_type":"function_call","callee":"EPS_GetBoostFactor","description":"Lookup interpolated boost factor","trace_reqs":["REQ-033","REQ-034"],"confidence":0.90},
                {"id":"N_03","name":"l_f32Assist = ASSIST_GAIN * l_f32DriverTorque / (1.0F + SPEED_COEFF * l_f32Speed)","node_type":"action","description":"Compute base assist torque","trace_reqs":["REQ-033"],"confidence":0.90},
                {"id":"N_04","name":"l_f32Assist *= l_f32Boost","node_type":"action","description":"Apply boost map scaling","trace_reqs":["REQ-033"],"confidence":0.85},
                {"id":"N_05","name":"End","node_type":"final","trace_reqs":["REQ-032"],"confidence":0.95,"description":"Return l_f32Assist"}
              ],
              "edges": [
