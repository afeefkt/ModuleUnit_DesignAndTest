            {
              "diagram_type": "activity",
              "name": "EPS_CalcAssistTorque Code Flow",
              "function_name": "EPS_CalcAssistTorque",
              "parent_diagram": "RE_ControlTorque Code Flow",
              "owner_swc": "SWC_EPS",
