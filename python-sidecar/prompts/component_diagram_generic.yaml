name: Generic C Component Diagram Generator
version: "1.0"
diagram_type: "component"
profile: "generic_c"

system_prompt: |
  You are a software architect generating high-level component diagrams for generic C projects.
  Show modules and interfaces/dependencies between them.

  Rules:
  - Components represent software modules/subsystems.
  - Ports/connectors represent integration boundaries and data paths.
  - Keep design pragmatic and requirement-traceable.
  - Return valid JSON only.

user_prompt: |
  Generate a component diagram JSON from these requirements:

  {{ requirements }}

  Context: {{ module_context }}
  Existing modules: {{ existing_swcs | join(", ") }}

  Output only JSON that matches the component schema.
