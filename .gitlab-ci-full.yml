# GitLab CI/CD Pipeline for CppUTest Generator
# Tests: Docker build, service health, C code analysis, test generation

stages:
  - build
  - test
  - integration

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # Use CPU-only for CI (most GitLab runners don't have GPU)
  OLLAMA_GPU_LAYERS: "0"
  OLLAMA_FLASH_ATTENTION: "false"

# Build Docker images
build:docker:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - echo "Building CppUTest Generator image..."
    - docker build -t cpputest-generator:$CI_COMMIT_SHORT_SHA .
    - docker tag cpputest-generator:$CI_COMMIT_SHORT_SHA cpputest-generator:latest
    - echo "Build successful!"
  artifacts:
    reports:
      dotenv: build.env
  only:
    - main
    - merge_requests
    - develop

# Test Python code quality
test:lint:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install flake8 black pylint
  script:
    - echo "Running code quality checks..."
    - black --check main.py || echo "Code formatting issues found"
    - flake8 main.py --max-line-length=120 --ignore=E501,W503 || echo "Linting issues found"
    - echo "Linting complete"
  allow_failure: true
  only:
    - merge_requests
    - main

# Test Docker compose configuration
test:compose:
  stage: test
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - echo "Validating docker-compose.yml..."
    - docker compose version
    - docker compose -f docker-compose.yml config
    - echo "Docker compose configuration is valid"
  only:
    - main
    - merge_requests

# Integration test - Start services and test basic functionality
test:integration:
  stage: integration
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    OLLAMA_URL: "http://ollama:11434/api"
  before_script:
    # Install curl and jq for testing
    - apk add --no-cache curl jq bash
    - mkdir -p c_projects/test_project test_examples generated_tests logs
    # Create test C file
    - |
      cat > c_projects/test_project/test.c << 'EOF'
      #include <stdio.h>
      
      int add(int a, int b) {
          return a + b;
      }
      
      int multiply(int x, int y) {
          return x * y;
      }
      EOF
  script:
    - echo "Starting services..."
    - docker compose up -d
    
    - echo "Waiting for services to be ready..."
    - sleep 30
    
    - echo "Checking health endpoint..."
    - |
      for i in {1..30}; do
        if curl -f http://localhost:8000/health; then
          echo "Service is healthy!"
          break
        fi
        echo "Waiting for service... ($i/30)"
        sleep 5
      done
    
    - echo "Testing health endpoint..."
    - curl -f http://localhost:8000/health | jq .
    
    - echo "Testing project analysis..."
    - |
      ANALYSIS=$(curl -s "http://localhost:8000/analyze-project?project_path=/app/c_projects/test_project")
      echo "$ANALYSIS" | jq .
      FUNC_COUNT=$(echo "$ANALYSIS" | jq '.total_functions')
      if [ "$FUNC_COUNT" -eq 2 ]; then
        echo "✓ Analysis test passed: Found $FUNC_COUNT functions"
      else
        echo "✗ Analysis test failed: Expected 2 functions, found $FUNC_COUNT"
        exit 1
      fi
    
    - echo "All integration tests passed!"
  after_script:
    - docker compose logs cpputest-generator || true
    - docker compose logs ollama || true
    - docker compose down
  timeout: 15m
  only:
    - main
    - merge_requests

# Quick smoke test (faster, runs on every commit)
test:smoke:
  stage: test
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - echo "Running smoke test..."
    - docker build -t cpputest-generator:test .
    - docker run --rm cpputest-generator:test python -c "import main; print('Import successful')"
    - echo "Smoke test passed!"
  only:
    - branches
    - merge_requests

# Test with example project (optional, can be manual)
test:example:
  stage: integration
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - apk add --no-cache curl jq bash
    - mkdir -p c_projects test_examples generated_tests logs
    # Create example math project
    - |
      mkdir -p c_projects/example_math
      cat > c_projects/example_math/math.c << 'EOF'
      int add(int a, int b) { return a + b; }
      int subtract(int a, int b) { return a - b; }
      int multiply(int a, int b) { return a * b; }
      EOF
  script:
    - echo "Starting services..."
    - docker compose up -d
    
    - echo "Waiting for services..."
    - sleep 30
    
    - echo "Analyzing example project..."
    - curl -f "http://localhost:8000/analyze-project?project_path=/app/c_projects/example_math" | jq .
    
    - echo "Testing test generation for single function..."
    - |
      RESPONSE=$(curl -s -X POST http://localhost:8000/generate-tests \
        -H "Content-Type: application/json" \
        -d '{"project_path": "/app/c_projects/example_math", "function_name": "add"}')
      
      echo "$RESPONSE" | jq .
      
      STATUS=$(echo "$RESPONSE" | jq -r '.status')
      if [ "$STATUS" = "success" ]; then
        echo "✓ Test generation successful"
      else
        echo "✗ Test generation failed"
        exit 1
      fi
  after_script:
    - docker compose down
  when: manual
  timeout: 20m
  only:
    - main

# Security scan
security:trivy:
  stage: test
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - docker build -t cpputest-generator:scan .
    - trivy image --severity HIGH,CRITICAL cpputest-generator:scan
  allow_failure: true
  only:
    - main
    - merge_requests

# Code coverage (optional)
test:coverage:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install pytest pytest-cov
  script:
    - echo "Code coverage test placeholder"
    - echo "Add pytest tests for main.py functions"
  allow_failure: true
  coverage: '/TOTAL.*\s+(\d+%)$/'
  only:
    - main
    - merge_requests
  when: manual