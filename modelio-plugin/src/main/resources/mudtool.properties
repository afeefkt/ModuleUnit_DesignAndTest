# MUD Tool - Modelio Plugin Configuration
# =========================================

# Python Sidecar Connection
mudtool.sidecar.host=127.0.0.1
mudtool.sidecar.port=8042
mudtool.sidecar.autostart=true
mudtool.python.path=python
mudtool.sidecar.workdir=.

# AI Backend: cloud, local, auto
mudtool.ai.backend=cloud
mudtool.ai.confidence_threshold=0.6
mudtool.ai.max_retries=3

# AUTOSAR Naming Conventions (regex)
mudtool.naming.swc=^SWC_[A-Z][A-Za-z0-9_]+$
mudtool.naming.runnable=^RE_[A-Z][A-Za-z0-9_]+$
mudtool.naming.port=^(PP|RP)_[A-Z][A-Za-z0-9_]+$

# Export Settings
mudtool.export.format=xmi
mudtool.export.directory=output
