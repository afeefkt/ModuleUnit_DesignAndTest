name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mud-tool:
    name: mud-tool (design half)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mud-tool/python-sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check . || true
      - name: Unit tests
        run: pytest -q -m "not live" || true

  bridge-and-launcher:
    name: bridge + launcher (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Byte-compile bridge + launcher
        run: |
          python -m py_compile bridge/mud_to_tests.py launcher/streamlit_app.py
      - name: Bridge CLI help
        run: python bridge/mud_to_tests.py --help
      - name: Traceability extraction self-check
        run: |
          python - <<'PY'
          import sys; sys.path.insert(0, "bridge")
          from mud_to_tests import extract_requirements
          reqs = extract_requirements("/* Requirements: REQ_001, REQ_002 */")
          assert reqs == ["REQ_001", "REQ_002"], reqs
          print("ok", reqs)
          PY

  cpputest-rag:
    name: cpputest-rag (backend import)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cpputest-rag/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Import app
        run: python -c "import app.main; print('cpputest-rag backend imports OK')"
